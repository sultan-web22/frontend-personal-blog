
<select id="cat-select" [(ngModel)]="selectedCategory" class="category-dropdown">
  <option *ngFor="let cat of categories" [value]="cat">
    #{{ cat }}
  </option>
</select>
<div class="post-editor-container">
  <h2>Create a New Post</h2>

  <!-- Global Post Properties -->
  <div class="form-group">
    <label for="mainTitle">Post Title:</label>
    <input id="mainTitle" [(ngModel)]="postTitle" (ngModelChange)="savetolocalstorage()" placeholder="Enter main post title..." />
  </div>

  <hr />

  <!-- Loop through every slide dynamically -->
  <div *ngFor="let slide of slides; let i = index" class="slide-card">
    <h3>Slide #{{ i + 1 }} Management</h3>

    <div class="form-group">
      <label>Slide Subject Headline:</label>
      <input [(ngModel)]="slides" (ngModelChange)="savetolocalstorage()" />
    </div>

    <div class="form-group">
      <label>Slide Body Content:</label>
      <!-- Saving triggers on every keystroke automatically using ngModelChange -->
      <textarea [(ngModel)]="slide.content" (ngModelChange)="savetolocalstorage()" rows="4"></textarea>
    </div>
  </div>

  <!-- Actions Toolbar -->
  <div class="action-buttons">
    <button type="button" (click)="addSlide()">+ Add New Slide</button>
    <button type="button" (click)="savetolocalstorage()" class="btn-secondary">Save Draft Manually</button>
    <button type="button" (click)="submitpost()" class="btn-primary" [disabled]="!postTitle">Publish Post to Backend</button>
  </div>
</div>
